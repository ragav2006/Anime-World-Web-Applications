<!DOCTYPE html>
<html>
<head>
    <title>Login -ONLINE ANILAB </title>
    <style>
        body {
            background-image: url("background.jpeg.jpg");

        
            margin: 0;
            font-family: Arial;
            
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff4757;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #ff6b81;
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body img src="Solo.jpeg">

<div class="login-box">
    <h2>🎥 Anime World</h2>

    <input type="text" id="username" placeholder="username">
    <input type="password" id="password" placeholder="password">

    <button onclick="login()">Login</button>

    <p class="error" id="errorMsg"></p>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    // simple demo login
    if (user === "admin" && pass === "1234") {
        window.location.href = "anime.html"; // your main page
    }
    else if   (user === "ragav" && pass === "123") {
        window.location.href = "anime.html"; // your main page
    }
    else {
        document.getElementById("errorMsg").innerText = "Invalid username or password";
    }
    

}
</script>

</body>
</html>
