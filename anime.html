<!DOCTYPE html>
<html>
<head>
    <title>ONLINE ANILAB</title>
    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
            margin: 0;
        }

        header {
            background: #222;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #1e1e1e;
            margin: 10px;
            padding: 10px;
            width: 200px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .player {
            text-align: center;
            margin-top: 20px;
        }

        video {
            width: 80%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>ONLINE ANILAB</header>

<div class="container">

    <div class="card" onclick="window.location.href='naruto.html'">
        <img src="naruto.jpeg">
        <h3>NARUTO</h3>
    
    </div>

    <div class="card" onclick="window.location.href='solo.html'">
        <img src="Solo.jpeg">
        <h3>SOLO LEVELING</h3>
    </div>

    <div class="card" onclick="window.location.href='haikyuu.html'">
        <img src="haikyuu.jpeg">
        <h3>HAIKYUU !</h3>
    </div>
    
    <div class="card" onclick="window.location.href='jujustu.html'">
        <img src="jujustu1.jpeg">
        <h3>JUJUSTU KAISEN<h3>

    </div>


</div>


</body>
</html>
